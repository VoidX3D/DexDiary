name: App Debug CI

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # AGP 7.3.1 in this repository is compatible with Gradle 7.4.x
          gradle-version: 7.4.2

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Link preview modules expected by settings.gradle
        run: |
          [ -d app ] || ln -s previews/app app
          [ -d core-navigation ] || ln -s previews/core-navigation core-navigation

      - name: Gradle projects check
        run: gradle projects --no-daemon --stacktrace

      - name: Assemble debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Run debug unit tests
        run: gradle :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-test-reports
          path: |
            app/build/reports/tests/testDebugUnitTest/**
            app/build/test-results/testDebugUnitTest/**
          if-no-files-found: warn
